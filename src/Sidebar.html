<!DOCTYPE html>
<html>
  <head>
    <base target="_top">
    <style>
      :root {
        color-scheme: light;
        --panel-bg: #f5f7fb;
        --card-bg: #ffffff;
        --line: #d7dfeb;
        --text: #1f2937;
        --muted: #5f6b7a;
        --accent: #2563eb;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        padding: 16px;
        background: linear-gradient(180deg, #eef4ff 0%, var(--panel-bg) 160px);
        color: var(--text);
        font: 13px/1.45 Arial, sans-serif;
      }

      .shell {
        background: var(--card-bg);
        border: 1px solid var(--line);
        border-radius: 16px;
        overflow: hidden;
        box-shadow: 0 10px 24px rgba(15, 23, 42, 0.08);
      }

      .header {
        padding: 16px;
        border-bottom: 1px solid var(--line);
      }

      h1 {
        margin: 0;
        font-size: 18px;
      }

      .doc-name {
        margin-top: 4px;
        color: var(--muted);
      }

      .body {
        padding: 16px;
      }

      .footer {
        padding: 0 16px 16px;
        color: var(--muted);
        font-size: 12px;
      }

      .loading {
        display: inline-flex;
        align-items: center;
        gap: 10px;
        color: var(--accent);
        font-weight: 600;
      }

      .spinner {
        width: 14px;
        height: 14px;
        border: 2px solid #c9d8fb;
        border-top-color: var(--accent);
        border-radius: 50%;
        animation: spin 0.8s linear infinite;
      }

      .hint {
        margin-top: 12px;
        color: var(--muted);
      }

      @keyframes spin {
        to {
          transform: rotate(360deg);
        }
      }
    </style>
  </head>
  <body>
    <div class="shell">
      <div class="header">
        <h1>Action Sync</h1>
        <div class="doc-name"><?= docName ?></div>
      </div>
      <div class="body">
        <div class="loading" aria-live="polite">
          <span class="spinner" aria-hidden="true"></span>
          <span>Loading sidebar...</span>
        </div>
        <div class="hint">The rich HTML sidebar is starting up.</div>
      </div>
      <div class="footer"><?= buildVersion ?></div>
    </div>
  </body>
</html>
